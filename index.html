<!doctype html>
<html lang="it">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Movie DB</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link rel="icon" href="assets/img/EPICODE-pitto-color.png" />
		<link rel="stylesheet" type="text/css" href="assets/css/style.css" />
	</head>
	<body>
		<header class="container-fluid bg-dark text-light text-center p-3 mb-3">
			<h1>THE MOVIE DB</h1>
		</header>

		<div class="container">
			<div
				class="spinner-border text-primary"
				role="status"
				id="spinnerCat"
			>
				<span class="visually-hidden">Loading...</span>
			</div>
			<div class="row">
				<div class="col-6">
					<h2>Seleziona una categoria di film</h2>
					<select id="categories" class="form-select w-50 hide">
						<option value="" selected></option>
					</select>
				</div>
				<div class="col-6">
					<h2 id="selectedCat"></h2>
				</div>
			</div>
		</div>

		<hr />

		<div class="container">
			<div
				class="spinner-border text-primary hide"
				role="status"
				id="spinnerMovies"
			>
				<span class="visually-hidden">Loading...</span>
			</div>
			<div class="row" id="movieCards"></div>
		</div>

		<div
			class="modal fade"
			id="trailerModal"
			tabindex="-1"
			aria-labelledby="trailerModalTitle"
			aria-hidden="true"
		>
			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="trailerModalTitle"></h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
							aria-label="close"
						></button>
					</div>
					<div class="modal-body position-relative">
						<div
							class="position-absolute top-50 start-50 translate-middle z-3 hide"
							id="trailerSpinner"
						>
							<div
								class="spinner-border text-primary"
								role="status"
							>
								<span class="visually-hidden">Loading...</span>
							</div>
						</div>
						<div class="ratio ratio-16x9">
							<iframe
								id="trailerModalVideo"
								src=""
								allowfullscreen
							></iframe>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script src="assets/js/script.js"></script>
	</body>
</html>
